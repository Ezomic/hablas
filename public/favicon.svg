<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Hablas mark: a speech bubble ("hablas" = "you speak").

    A deliberately bold simplification of the outlined logo used in the app
    chrome (HablasLogoIcon.vue), and flatter even than the app icons in
    public/pwa-*.png: no interior text lines. Browsers prefer this SVG over
    favicon.ico, so this artwork is what renders in the tab at 16px — where a
    thin outline turns to mush and two 1px lines collapse into grey noise.
    Verified by rasterising to 16px and inspecting.

    Colours are explicit rather than currentColor, since favicons render with no
    CSS context. Near-black square from the app's neutral palette with a white
    glyph, legible on light and dark tab bars alike.
  -->
  <rect width="64" height="64" rx="14" fill="#171717"/>
  <path
    d="M11 19A6 6 0 0 1 17 13h30a6 6 0 0 1 6 6v18a6 6 0 0 1-6 6H30l-13.2 8.1A1.1 1.1 0 0 1 15 50.2V43h-4V19Z"
    fill="#FAFAFA"
  />
</svg>
