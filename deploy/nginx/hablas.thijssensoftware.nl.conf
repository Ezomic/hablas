# nginx server block for hablas.thijssensoftware.nl
# Install to /etc/nginx/sites-available/hablas.thijssensoftware.nl and symlink
# into sites-enabled. TLS is served from the shared certbot lineage; add
# hablas.thijssensoftware.nl to that cert BEFORE enabling this block
# (see deploy/PROVISION.md).

server {
    listen 80;
    listen [::]:80;
    server_name hablas.thijssensoftware.nl;

    # Allow HTTP-01 renewals, redirect everything else to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # nginx on this droplet is 1.18; `http2 on;` is 1.25.1+ syntax and fails
    # `nginx -t` here. The other vhosts likewise use plain `listen ... ssl`.
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name hablas.thijssensoftware.nl;

    root /home/deploy/hablas/public;
    index index.php;

    # Shared certbot lineage `thijssensoftware.nl` (managed via
    # ~/infra/bin/renew-shared-cert.sh; hablas is a SAN on it).
    ssl_certificate     /etc/letsencrypt/live/thijssensoftware.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thijssensoftware.nl/privkey.pem;

    charset utf-8;
    client_max_body_size 20M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        # Shared php8.4-fpm pool (same socket the other apps use).
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;

        # /login response headers are ~4.3KB: a ~3.2KB Link: preload header from
        # Vite plus encrypted session+XSRF cookies (SESSION_ENCRYPT=true). That
        # overflows nginx's 4k default and 502s with "upstream sent too big
        # header". The other apps don't hit this (they run SESSION_ENCRYPT=false
        # and preload less), so this tuning is hablas-specific.
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 16k;
        fastcgi_busy_buffers_size 32k;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/hablas-access.log;
    error_log  /var/log/nginx/hablas-error.log;
}
