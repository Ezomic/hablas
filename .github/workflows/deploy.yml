name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  # Build the front-end assets on the runner instead of on the droplet. The
  # droplet has 2GB RAM and no swap, where `npm ci` alone took ~8m and once hit
  # the ssh timeout mid-install — leaving a node_modules with no .bin/ and a
  # half-deployed production (see HAB-41). Building here removes the slowest and
  # most memory-hungry step from the server entirely; the droplet no longer needs
  # Node or devDependencies at all, and a failed build never touches production.
  build:
    name: Build assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: npm

      # `npm run build` boots artisan via the Wayfinder Vite plugin (it
      # generates resources/js/routes/* from the route table), so the build
      # needs a bootable app: PHP deps + an APP_KEY. Mirrors tests.yml.
      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare app for artisan boot
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Build assets
        run: npm run build

      # The PWA build emits public/build/ (Vite assets + manifest) and
      # public/sw.js (the service worker). Under injectManifest — this
      # project's strategy — workbox is bundled into sw.js, so there is no
      # separate public/workbox-*.js; ship it only on the chance a future
      # config switch to generateSW emits one. Stage everything under one dir
      # preserving the public/ layout so the deploy job can drop it straight in.
      - name: Stage built assets
        run: |
          mkdir -p dist/public
          cp -r public/build dist/public/build
          cp public/sw.js dist/public/sw.js
          cp public/workbox-*.js dist/public/ 2>/dev/null || true

      - name: Upload built assets
        uses: actions/upload-artifact@v7
        with:
          name: public-assets
          path: dist/public
          retention-days: 3
          include-hidden-files: true

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built assets
        uses: actions/download-artifact@v8
        with:
          name: public-assets
          path: dist

      # Ship the built assets into a staging dir on the droplet. rm clears any
      # leftover from a previous run so no stale files linger.
      - name: Copy assets to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: 'dist/*'
          target: /home/deploy/hablas/deploy-incoming
          strip_components: 1
          rm: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # No npm on the server anymore, so the old 25m headroom for `npm ci`
          # isn't needed. The remaining steps (composer, migrate, optimize) are
          # fast; keep a comfortable margin.
          command_timeout: 10m
          script: |
            set -e
            cd /home/deploy/hablas
            git fetch origin
            # Pin to the exact commit the build job built its assets from, not
            # a moving origin/main. If another push lands on main while this
            # deploy waits in the production queue, resetting to origin/main
            # would serve newer PHP/routes against this run's older manifest —
            # a Vite-manifest miss (500). This keeps code and assets in lockstep.
            git reset --hard ${{ github.sha }}
            composer install --no-dev --optimize-autoloader --no-interaction
            # Clear any stale config/route/view cache from the previous release
            # before rebuilding it below.
            php artisan optimize:clear
            # Locate the assets the build job shipped, tolerant of whether
            # scp-action stripped the leading dir, and confirm the required
            # outputs (build/ + sw.js) arrived — BEFORE migrating or touching
            # the live public/, so a malformed transfer aborts the deploy
            # instead of leaving a migrated DB or a half-swapped public/.
            # workbox-*.js is optional (injectManifest bundles it into sw.js).
            if [ -d deploy-incoming/build ]; then
              INCOMING=deploy-incoming
            elif [ -d deploy-incoming/dist/build ]; then
              INCOMING=deploy-incoming/dist
            else
              echo "Shipped build/ not found under deploy-incoming"; exit 1
            fi
            test -f "$INCOMING/sw.js"
            php artisan migrate --force
            # Course/reference content (languages, units, vocabulary, placement
            # items, can-do statements). ContentSeeder holds no user fixtures and
            # every seeder it calls uses updateOrCreate, so running it each
            # release is idempotent. Without it the app has no course to start.
            php artisan db:seed --class=ContentSeeder --force
            php artisan optimize
            # Swap in the validated assets. Keep the previous build until the
            # new one is in place, then discard it, so the window where
            # public/build is absent is a single rename.
            rm -rf public/build.old
            [ -d public/build ] && mv public/build public/build.old
            mv "$INCOMING/build" public/build
            cp -f "$INCOMING/sw.js" public/sw.js
            # Clear any stale workbox-*.js (the injectManifest sw.js doesn't
            # reference one), then ship a new one only if the build produced it.
            rm -f public/workbox-*.js
            cp -f "$INCOMING"/workbox-*.js public/ 2>/dev/null || true
            rm -rf public/build.old deploy-incoming
            sudo /bin/systemctl reload php8.4-fpm
            # Restart the scheduler (SendDailyDigests) and the database queue
            # worker (DailyDigestNotification) so both pick up the new code.
            sudo /usr/bin/supervisorctl restart hablas-scheduler:*
            sudo /usr/bin/supervisorctl restart hablas-queue:*
