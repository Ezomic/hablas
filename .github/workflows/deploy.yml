name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # appleboy/ssh-action defaults to a 10m command_timeout. `npm ci` alone
          # takes ~8m on this droplet, so the default killed the deploy midway —
          # leaving new code against an un-migrated DB and a node_modules with no
          # .bin/ (npm had not reached the link stage), so `vite` vanished and the
          # build could not be re-run. Give the whole script real headroom.
          command_timeout: 25m
          script: |
            set -e
            cd /home/deploy/hablas
            git fetch origin
            git reset --hard origin/main
            composer install --no-dev --optimize-autoloader --no-interaction
            # MUST come before the build. Wayfinder generates resources/js/routes/*
            # (gitignored) by booting artisan, so a leftover route cache from the
            # PREVIOUS deploy makes it emit the previous deploy's route table — any
            # newly added route is missing and the build dies with
            # UNLOADABLE_DEPENDENCY. It also clears a cache that can reference
            # classes this release deleted.
            php artisan optimize:clear
            npm ci --no-audit --no-fund
            npm run build
            php artisan migrate --force
            # Course/reference content (languages, units, vocabulary, placement
            # items, can-do statements). ContentSeeder holds no user fixtures, so
            # unlike DatabaseSeeder it is safe here; every seeder it calls uses
            # updateOrCreate, so running it each release is idempotent and just
            # brings content up to date. Without this the app has no course to
            # start, and UnlockSpanishForNewUser silently no-ops on registration.
            php artisan db:seed --class=ContentSeeder --force
            # Rebuild config/route/view cache from the new code. Without this the
            # old cache persists and the fpm reload below just reloads stale routes.
            php artisan optimize
            sudo /bin/systemctl reload php8.4-fpm
            # Restart the scheduler (SendDailyDigests) and the database queue
            # worker (DailyDigestNotification) so both pick up the new code.
            sudo /usr/bin/supervisorctl restart hablas-scheduler:*
            sudo /usr/bin/supervisorctl restart hablas-queue:*
